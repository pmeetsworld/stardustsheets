<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111315">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AEGIS Encounter">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/aegis-app-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/aegis-apple-touch-icon.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AEGIS SOLUTIONS - Encounter Viewer</title>
<script>
(function(){
  var build = '20260630a';
  window.AEGIS_BUILD = build;
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js?app=' + build, { updateViaCache: 'none' }).catch(function(){});
  }
  if (location.protocol === 'file:') return;
  var params = new URLSearchParams(location.search);
  if (params.get('app') === build) return;
  params.set('app', build);
  location.replace(location.pathname + '?' + params.toString() + location.hash);
})();
</script>
<link rel="stylesheet" href="styles.css?v=20260630a">
</head>
<body class="encounter-body">
  <div class="toolbar app-toolbar encounter-toolbar">
    <a class="brand brand-link" href="campaign.html?app=20260630a" aria-label="Open campaign roster">AEGIS <b>SOLUTIONS</b></a>
    <span class="hint">Encounter Viewer</span>
    <span class="spacer"></span>
    <a class="nav-btn" href="campaign.html?app=20260630a">Roster</a>
    <a class="nav-btn" href="dm.html?app=20260630a">DM Screen</a>
    <span class="hint" id="encounterStatus">Connecting</span>
  </div>

  <main class="encounter-shell">
    <section class="encounter-head">
      <div>
        <p class="dm-kicker">Public Combat Feed</p>
        <h1>Encounter Viewer</h1>
      </div>
      <div class="encounter-meta">
        <span class="enc-live-pill" id="encounterLivePill">Waiting</span>
        <span class="enc-round-pill">Round <b id="encounterRound">-</b></span>
        <button type="button" class="enc-reconnect" id="encounterReconnectBtn">Retry</button>
      </div>
    </section>

    <section class="enc-waiting" id="encounterWaiting">
      <div class="enc-loader" aria-hidden="true"></div>
      <h2>Waiting For Combat</h2>
      <p>The initiative feed will appear when the DM turns Combat Live on.</p>
    </section>

    <section class="enc-board" id="encounterBoard" hidden>
      <div class="enc-board-head">
        <span>Initiative Order</span>
        <span id="encounterUpdated">Live sync ready</span>
      </div>
      <div class="enc-table-head" aria-hidden="true">
        <span>Init</span>
        <span>Combatant</span>
        <span>Status</span>
        <span>Speed</span>
        <span>Conditions</span>
      </div>
      <div class="enc-list" id="encounterList"></div>
    </section>
  </main>

  <script src="cloud-config.js?v=20260630a"></script>
  <script src="view-mode.js?v=20260630a"></script>
  <script src="field-map.js?v=20260630a"></script>
  <script src="encounter.js?v=20260630a"></script>
</body>
</html>

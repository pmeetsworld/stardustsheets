<title>AEGIS SOLUTIONS - Campaign Roster</title>
<script>
(function(){
  var build = '20260712c';
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js?app=' + build, { updateViaCache: 'none' }).catch(function(){});
  }
  if (location.protocol === 'file:') return;
  var params = new URLSearchParams(location.search);
  if (params.get('app') === build) return;
  params.set('app', build);
  location.replace(location.pathname + '?' + params.toString() + location.hash);
})();
</script>
<link rel="stylesheet" href="styles.css?v=20260712c">
<style>
body{ padding:54px 16px; min-height:100vh; }
.roster-shell{
  max-width:920px; margin:0 auto; border:1px solid var(--frame);
  border-radius:var(--r); background:linear-gradient(180deg,var(--bg-2),var(--bg)); padding:18px;
  box-shadow:var(--shadow-raised);
}
.roster-head{ display:flex; align-items:center; gap:12px; border-bottom:1.5px solid var(--red); padding-bottom:14px; margin-bottom:16px; }
.roster-head .emblem{ width:34px; height:38px; }
.roster-head h1{ font-family:var(--font-mono); font-size:18px; letter-spacing:.24em; text-transform:uppercase; }
.roster-head p{ color:var(--label-dim); font-size:12px; letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
.roster-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:10px; }
.roster-card{
  display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:center; gap:12px;
  text-decoration:none; color:var(--label); background:linear-gradient(180deg,#24282c,var(--bg-2));
  border:1px solid var(--frame); border-left:3px solid var(--ice); border-radius:var(--r); padding:12px;
  box-shadow:var(--shadow-panel);
  transition:border-color var(--dur), transform var(--dur), background var(--dur);
}
.roster-card:hover{ border-color:var(--red); transform:translateY(-1px); }
.roster-card .name{ font-size:17px; font-weight:800; line-height:var(--lh-snug); margin-bottom:3px; overflow-wrap:anywhere; }
.roster-card .player{ color:var(--label-dim); font-size:11px; letter-spacing:.12em; text-transform:uppercase; }
.roster-card em{
  font:700 9px var(--font-mono);
  letter-spacing:.14em;
  text-transform:uppercase;
  font-style:normal;
  color:var(--ice-2);
  border:1px solid rgba(127,153,189,.48);
  border-radius:var(--r);
  padding:5px 7px;
  background:rgba(127,153,189,.10);
  white-space:nowrap;
}
.roster-actions{ display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:10px; }
.roster-dm{
  display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:center; justify-content:space-between; gap:12px;
  text-decoration:none; color:var(--label); background:linear-gradient(180deg,#2a2d31,#1f2226);
  border:1px solid rgba(255,90,60,.55); border-left:3px solid var(--red); border-radius:var(--r); padding:12px;
  box-shadow:var(--shadow-panel);
  transition:border-color var(--dur), transform var(--dur), background var(--dur);
}
.roster-dm:hover{ border-color:var(--red); transform:translateY(-1px); }
.roster-dm b{ display:block; color:var(--label); font-size:17px; font-weight:800; letter-spacing:0; text-transform:none; margin-bottom:3px; }
.roster-dm span{ color:var(--label-dim); font-size:11px; letter-spacing:.08em; text-transform:uppercase; }
.roster-dm em{ font-style:normal; color:var(--red); font-family:var(--font-mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; }
.roster-foot{ margin-top:16px; color:var(--label-dim); font-size:12px; line-height:1.5; }
body.view-mobile-effective .roster-shell{ width:min(560px,100%); max-width:560px; padding:14px; border-radius:8px; }
body.view-mobile-effective .roster-head{ align-items:flex-start; gap:10px; }
body.view-mobile-effective .roster-head h1{ font-size:15px; letter-spacing:.18em; }
body.view-mobile-effective .roster-grid,
body.view-mobile-effective .roster-actions{ grid-template-columns:1fr; }
body.view-mobile-effective .roster-card,
body.view-mobile-effective .roster-dm{ align-items:flex-start; gap:10px; }
body.view-mobile-effective .roster-card em,
body.view-mobile-effective .roster-dm em{ flex:0 0 auto; }
</style>
</head>
<body>
  <div class="toolbar app-toolbar campaign-toolbar">
    <a class="brand brand-link" href="campaign.html?app=20260712c" aria-label="Open campaign roster">AEGIS <b>SOLUTIONS</b></a>
    <span class="hint">Campaign Roster</span>
    <span class="spacer"></span>
    <a class="nav-btn" href="dm.html?app=20260712c">DM</a>
    <a class="nav-btn" href="world.html?app=20260712c">World</a>
  </div>
  <main class="roster-shell">
    <div class="roster-head">
      <svg class="emblem" viewBox="0 0 40 44" fill="none"><path d="M20 2 L37 9 V24 C37 34 29 40 20 43 C11 40 3 34 3 24 V9 Z" stroke="currentColor" stroke-width="2"/><path d="M20 11 L28 31 H23.2 L20 22.5 L16.8 31 H12 Z" fill="currentColor"/></svg>
      <div>
        <h1>AEGIS SOLUTIONS</h1>
        <p>Campaign Roster</p>
      </div>
    </div>
    <div class="roster-actions">
      <a class="roster-dm" href="dm.html?app=20260712c">
        <span><b>DM Screen</b>Party stats / Session notes / World controls</span>
        <em>Access</em>
      </a>
      <a class="roster-dm roster-public" href="world.html?app=20260712c">
        <span><b>World Viewer</b>Live battlemap / initiative / shared scenes</span>
        <em>Live</em>
      </a>
    </div>
    <div class="roster-grid" id="rosterGrid"></div>
    <p class="roster-foot">Open a character to view their live sheet. Use Edit with the table access code to update a sheet.</p>
  </main>
  <script src="cloud-config.js?v=20260712c"></script>
  <script src="view-mode.js?v=20260712c"></script>
  <script>
    const APP_VERSION = '20260712c';
    const grid = document.getElementById('rosterGrid');
    const chars = (window.AEGIS_CLOUD && window.AEGIS_CLOUD.characters) || [];
    grid.innerHTML = chars.map((c) => `
      <a class="roster-card" href="sheet.html?app=${APP_VERSION}&slug=${encodeURIComponent(c.slug)}">
        <span>
          <div class="name">${c.name}</div>
          <div class="player">${c.player}</div>
        </span>
        <em>Open</em>
      </a>
    `).join('');
  </script>
</body>
</html>
